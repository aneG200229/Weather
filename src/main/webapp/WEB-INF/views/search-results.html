<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Homepage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/style.css}" href="style.css">
</head>
<body>

<nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <img src="images/weather-app.png" alt="" width="30" height="24" class="d-inline-block align-text-top">
            Weather Tracker
        </a>
        <div class="d-flex align-items-center">
            <span class="navbar-text me-3" th:text="${currentUser.login}">username</span>
            <form th:action="@{/sign-out}" method="post">
                <button type="submit" class="btn btn-outline-danger">Sign out</button>
            </form>
        </div>
    </div>
</nav>

<section id="page-content">
    <div class="container mt-4">
        <form th:action="@{/search}" method="get" class="d-flex my-4">
            <div class="input-group location-search-input-group me-3">
                <input class="form-control" type="text" name="name"
                       placeholder="Enter location" required>
                <button class="btn btn-outline-secondary btn-sm clear-input-button"
                        type="button" onclick="this.previousElementSibling.value=''">
                    &times;
                </button>
            </div>
            <button type="submit" class="btn btn-outline-success">Search</button>
        </form>

        <div>
            <h2>Locations:</h2>
            <div class="row">
                <div th:each="location : ${locations}" class="col-12 col-lg-3 col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${location.name}"></h5>
                            <p> Latitude: <span class="card-text mb-1" th:text="${location.lat}"></span></p>
                            <p> Longitude:<span class="card-text mb-1" th:text="${location.lon}"></span></p>
                            <p> Country: <span class="card-text mb-1" th:text="${location.country}"></span></p>
                            <p> State: <span class="card-text mb-3" th:text="${location.state}"></span></p>
                            <form th:action="@{/locations/add}" method="post" class="mt-auto">
                                <input type="hidden" name="name" th:value="${location.name}">
                                <input type="hidden" name="lat" th:value="${location.lat}">
                                <input type="hidden" name="lon" th:value="${location.lon}">
                                <button class="btn btn-primary w-100">Add</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="d-flex flex-wrap justify-content-between align-items-center py-3 mt-4 border-top">
    <div class="px-4">
        <span>© Weather Viewer, project from <a href="https://zhukovsd.github.io/java-backend-learning-course/">zhukovsd/java-backend-learning-course</a> roadmap.</span>
    </div>
</footer>

</body>
</html>
